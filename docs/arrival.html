<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>来店趋势仪表盘</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="arrival-body">
    <div class="page-shell">
      <header class="hero hero-detail">
        <div class="hero-copy">
          <a class="back-link" href="./index.html">返回首页简报</a>
          <p class="eyebrow">Arrival Dashboard</p>
          <h1>来店趋势仪表盘</h1>
          <p class="hero-subtitle" id="dashboard-headline"></p>
        </div>
        <div class="hero-side">
          <div class="report-date-highlight" id="report-date-highlight"></div>
          <div class="meta-strip" id="meta-strip"></div>
        </div>
      </header>

      <main class="page-main">
        <section class="section-tabs" id="section-tabs"></section>
        <section class="dashboard-root" id="dashboard-root"></section>
      </main>
    </div>

    <div class="chart-modal" id="chart-modal">
      <div class="chart-modal-backdrop" data-close-modal="true"></div>
      <div class="chart-modal-dialog" role="dialog" aria-modal="true" aria-label="放大趋势图">
        <button type="button" class="chart-modal-close" data-close-modal="true" aria-label="关闭">×</button>
        <div class="chart-modal-meta">
          <p class="chart-modal-kicker">Chart Zoom</p>
          <h3 class="chart-modal-title" id="chart-modal-title"></h3>
          <p class="chart-modal-subtitle" id="chart-modal-subtitle"></p>
        </div>
        <div class="chart-modal-content" id="chart-modal-content"></div>
      </div>
    </div>

    <script type="module" src="./assets/arrival.js"></script>
  </body>
</html>
