<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="width:100%;height:100%;">
  <title>NEV / ICE 每日简报</title>
  <foreignObject x="0" y="0" width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN" style="width:100%;height:100%;">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link id="app-styles" rel="stylesheet" />
        <style>
          html, body { width: 100%; height: 100%; overflow: auto; }
          [hidden] { display: none !important; }
        </style>
      </head>
      <body>
        <div class="page-shell">
          <header class="hero">
            <div class="hero-topline">
              <h1>NEV / ICE 线索及来店简报</h1>
              <div class="report-date-highlight" id="report-date-highlight"></div>
            </div>
            <div class="meta-strip" id="meta-strip"></div>
          </header>

          <main class="workspace-layout">
            <aside class="sidebar" aria-label="页面导航">
              <div class="sidebar-sticky">
                <section class="panel-switcher">
                  <p class="sidebar-title">页面导航</p>
                  <div class="tab-list sidebar-tab-list" id="tab-list"></div>
                </section>
                <section class="branch-switcher" id="branch-switcher" hidden="hidden">
                  <p class="sidebar-title">分支目录</p>
                  <nav class="section-nav" id="section-nav" aria-label="板块目录"></nav>
                </section>
                <section class="capture-tools" aria-label="截图工具">
                  <p class="sidebar-title">截图工具</p>
                  <button type="button" class="capture-all-button" id="capture-all-button" disabled="disabled">一键截图趋势图</button>
                  <p class="capture-status" id="capture-status">加载完成后可批量导出各板块趋势图。</p>
                </section>
                <section class="month-tools" aria-label="月份切换">
                  <p class="sidebar-title">月份切换</p>
                  <button type="button" class="month-picker-toggle" id="month-picker-toggle" disabled="disabled">切换年月</button>
                  <div class="month-picker-panel" id="month-picker-panel" hidden="hidden">
                    <div class="month-picker-grid">
                      <label class="month-picker-field" for="month-year-select">
                        <span>年份</span>
                        <select id="month-year-select" disabled="disabled"></select>
                      </label>
                      <label class="month-picker-field" for="month-month-select">
                        <span>月份</span>
                        <select id="month-month-select" disabled="disabled"></select>
                      </label>
                    </div>
                    <div class="month-picker-actions">
                      <button type="button" class="month-apply-button" id="month-apply-button" disabled="disabled">查看所选月份</button>
                      <button type="button" class="month-current-button" id="month-current-button" disabled="disabled">回到当前月</button>
                    </div>
                  </div>
                  <p class="month-status" id="month-status">默认展示当前月份，后续可切换到已归档的历史月份。</p>
                </section>
              </div>
            </aside>

            <section id="dashboard-root" class="dashboard-root"></section>
          </main>
        </div>

        <template id="dashboard-template">
          <article class="dashboard">
            <header class="dashboard-header">
              <div><h2 class="dashboard-title"></h2></div>
              <p class="dashboard-headline"></p>
            </header>
            <div class="section-stack"></div>
          </article>
        </template>

        <template id="section-template">
          <section class="data-section">
            <div class="section-topline">
              <div><h3 class="section-title"></h3></div>
              <p class="section-headline"></p>
            </div>
            <details class="summary-panel">
              <summary class="summary-toggle">展开核心指标</summary>
              <div class="card-grid"></div>
            </details>
            <div class="section-note"></div>
            <div class="section-body">
              <div class="chart-card">
                <div class="chart-header"><h4>日趋势</h4><p></p></div>
                <div class="chart-wrap"></div>
              </div>
              <div class="table-card">
                <div class="chart-header"><h4>明细表</h4><p></p></div>
                <div class="table-wrap"></div>
              </div>
            </div>
          </section>
        </template>
      </body>
    </html>
  </foreignObject>

  <script><![CDATA[
    // jsDelivr intentionally serves HTML as text/plain. This SVG document keeps
    // the public CDN entry renderable while reusing the existing HTML application.
    const htmlNamespace = "http://www.w3.org/1999/xhtml";
    const nativeInnerHtml = Object.getOwnPropertyDescriptor(Element.prototype, "innerHTML");

    Object.defineProperty(document, "body", {
      value: document.querySelector("body"),
      configurable: true
    });

    document.createElement = function (name) {
      return document.createElementNS(htmlNamespace, name);
    };

    Object.defineProperty(Element.prototype, "innerHTML", {
      configurable: true,
      get: function () {
        return nativeInnerHtml.get.call(this);
      },
      set: function (markup) {
        if (this.namespaceURI !== htmlNamespace) {
          nativeInnerHtml.set.call(this, markup);
          return;
        }
        if (!markup) {
          this.replaceChildren();
          return;
        }

        const htmlDocument = document.implementation.createHTMLDocument("");
        const template = htmlDocument.createElement("template");
        nativeInnerHtml.set.call(template, String(markup));
        const children = Array.from(template.content.childNodes, function (child) {
          return document.importNode(child, true);
        });
        this.replaceChildren.apply(this, children);
      }
    });

    const cacheBust = Date.now();
    document.querySelector("#app-styles").setAttribute("href", "./assets/styles.css?v=" + cacheBust);
    const appScript = document.createElementNS("http://www.w3.org/2000/svg", "script");
    appScript.setAttribute("href", "./assets/app.js?v=" + cacheBust);
    document.documentElement.appendChild(appScript);
  ]]></script>
</svg>
